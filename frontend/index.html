<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- BASIC -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/nummoria_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PRIMARY SEO -->
    <title>Nummoria — AI Personal Finance Tracker & Advisor</title>
    <meta
      name="description"
      content="Nummoria is an AI-powered personal finance tracker and advisor that helps you manage expenses, income, and investments while delivering actionable insights to improve your financial decisions."
    />
    <meta name="robots" content="index, follow" />

    <!-- BRAND SIGNAL (helps Google not typo it as “nymoria”) -->
    <meta name="keywords" content="Nummoria, AI finance app, personal finance tracker, expense tracker, investment tracker, fintech app" />

    <!-- OPEN GRAPH (LinkedIn, WhatsApp, etc.) -->
    <meta property="og:title" content="Nummoria — AI Personal Finance Tracker & Advisor" />
    <meta
      property="og:description"
      content="Track expenses, manage investments, and get AI-powered financial insights with Nummoria."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nummoria.com" />
    <meta property="og:image" content="https://nummoria.com/nummoria_logo.png" />

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nummoria — AI Personal Finance Tracker & Advisor" />
    <meta
      name="twitter:description"
      content="Track expenses, manage investments, and get AI-powered financial insights with Nummoria."
    />
    <meta name="twitter:image" content="https://nummoria.com/nummoria_logo.png" />

    <!-- CANONICAL (VERY IMPORTANT) -->
    <link rel="canonical" href="https://nummoria.com/" />

    <!-- PERFORMANCE / TRUST -->
    <meta name="theme-color" content="#030508" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
